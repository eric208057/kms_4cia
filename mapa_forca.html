            const swatchClass = f.properties.tipo === 'subsetor' ? 'swatch' : 'swatch adjacente';

            span.className = 'clickable';
            span.innerHTML = `<span class="${swatchClass}" style="background:${f.properties.fillColor};"></span>${f.properties.name}`;

                      horarios: [ { turno: "CPP 03 (Diurno)", tempo: "09:10–10:10" } ] },
                    { local: "Av. Miguel Estéfano x Rua Dr. José Bento Ferreira", lat: -23.6353508, lng: -46.6285701,
                      horarios: [ { turno: "CPP 03 (Diurno)", tempo: "17:30–18:10" } ] }
                ]
            }
        ];

        const peIcon = L.AwesomeMarkers.icon({icon: 'flag', markerColor: 'darkred', prefix: 'fa', iconColor: 'white'});
        const cppMarkerGroups = {};

        // ───────────────────────────────────────────────
        //  SEDE DA 4ª CIA/PM (46º BPM/M)
        //  Fonte: policiamilitar.sp.gov.br/unidades/cpam2/cias4.html
        // ───────────────────────────────────────────────
        const sedeIcon = L.AwesomeMarkers.icon({icon: 'star', markerColor: 'red', prefix: 'fa', iconColor: 'white'});
        const sedeMarker = L.marker([-23.6418375, -46.5960601], { icon: sedeIcon, zIndexOffset: 1000 }).addTo(map)
            .bindPopup(`
                <b>Sede da 4ª Cia/PM (46º BPM/M)</b><br>
                Rua Francisco Bautista, 471 - Jd. Sta. Emília<br>
                São Paulo/SP - CEP 04183-070<br>
                Tel: (11) 2215-8534<br><br>
                <a href="https://www.google.com/maps/search/?api=1&query=-23.6418375,-46.5960601" target="_blank" rel="noopener" class="popup-link">
                    Abrir no Google Maps →
                </a>
            `);

        // Entrada da sede na legenda — clicável, igual aos subsetores (inserida no topo do painel)
        const controlPanel = document.querySelector('.control-panel');
        const legSedeTitle = document.createElement('div');
        legSedeTitle.className = 'legend-title';
        legSedeTitle.textContent = 'Sede da 4ª Cia';
        const legSedeRow = document.createElement('div');
        legSedeRow.className = 'legend';
        const sedeSpan = document.createElement('span');
        sedeSpan.className = 'clickable';
        sedeSpan.innerHTML = '<span class="swatch" style="background:#e0141a;"></span>Rua Francisco Bautista, 471 - Jd. Sta. Emília';
        sedeSpan.onclick = () => {
            map.setView(sedeMarker.getLatLng(), 16);
            sedeMarker.openPopup();
        };
        legSedeRow.appendChild(sedeSpan);
        controlPanel.insertBefore(legSedeRow, controlPanel.firstChild);
        controlPanel.insertBefore(legSedeTitle, controlPanel.firstChild);

        cppDiurno.forEach(c => {
            const group = [];
            c.pes.forEach(p => {
                const horariosHtml = p.horarios
                    .map(h => `<b>${h.turno}:</b> ${h.tempo}`)
                    .join('<br>');
                const m = L.marker([p.lat, p.lng], { icon: peIcon }).addTo(map)
                    .bindPopup(`<b>PE — ${p.local}</b><br><br>${horariosHtml}`);
                group.push(m);
            });
            cppMarkerGroups[c.cpp] = group;

            // Botão da legenda CPP: ao clicar, voa até o subsetor E abre os popups dos PEs
            const btn = document.createElement('div');
            btn.className = 'cpp-btn';
            btn.innerHTML = `<b>${c.cpp} — ${c.viatura}</b>${c.subsetorNome}<br><small>Via de maior risco: ${c.viaMaiorRisco}</small>`;
            btn.onclick = () => {
                const layer = polygonLayers[c.subsetorNome];
                if (layer) map.fitBounds(layer.getBounds().pad(0.15));
                group.forEach((m, i) => setTimeout(() => m.openPopup(), i * 300));
            };
            document.getElementById('legend-cpp').appendChild(btn);
        });

        // Ajusta a visão para enquadrar todos os polígonos
        const geoLayer = L.geoJSON(cppData);
        map.fitBounds(geoLayer.getBounds().pad(0.05));

        setTimeout(() => map.invalidateSize(), 300);
        window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 200));

        // ── LOCALIZAÇÃO EM TEMPO REAL ──────────────────────────────────
        let _locMarker = null, _locCircle = null, _followMe = true;

        const LocBtn = L.Control.extend({
            options: { position: 'topleft' },
            onAdd() {
                const btn = L.DomUtil.create('button', 'locate-btn');
                btn.innerHTML = '&#x1F4CD; Minha localização';
                btn.title = 'Centralizar na minha posição';
                L.DomEvent.on(btn, 'click', L.DomEvent.stopPropagation);
                btn.onclick = () => {
                    _followMe = true;
                    if (_locMarker) map.setView(_locMarker.getLatLng(), 16);
                };
                return btn;
            }
        });
        new LocBtn().addTo(map);

        map.on('locationfound', e => {
            const latlng = e.latlng, acc = e.accuracy;
            if (!_locMarker) {
                _locCircle = L.circle(latlng, { radius: acc / 2, color: '#1E88E5', weight: 1, fillOpacity: 0.12 }).addTo(map);
                _locMarker = L.circleMarker(latlng, {
                    radius: 9, color: '#fff', weight: 2.5,
                    fillColor: '#1E88E5', fillOpacity: 1
                }).addTo(map).bindPopup('Você está aqui');
            } else {
                _locMarker.setLatLng(latlng);
                _locCircle.setLatLng(latlng).setRadius(acc / 2);
            }
            if (_followMe) map.setView(latlng, map.getZoom());
        });

        map.on('drag', () => { _followMe = false; });

        map.on('locationerror', e => {
            console.warn('Localização indisponível:', e.message);
        });

        map.locate({ watch: true, enableHighAccuracy: true, maximumAge: 5000 });
        // ──────────────────────────────────────────────────────────────

        // ── BUSCA DE ENDEREÇO ──────────────────────────────────────────
        let _searchMarker = null;
        L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: 'Buscar rua, endereço...',
            collapsed: false,
            geocoder: L.Control.Geocoder.nominatim({
                geocodingQueryParams: { countrycodes: 'br' }
            })
        }).on('markgeocode', function(e) {
            if (_searchMarker) map.removeLayer(_searchMarker);
            _searchMarker = L.marker(e.geocode.center)
                .addTo(map)
                .bindPopup(`<b>${e.geocode.name}</b>`)
                .openPopup();
            map.setView(e.geocode.center, 17);
        }).addTo(map);
        // ──────────────────────────────────────────────────────────────
    </script>
</body>
</html>
