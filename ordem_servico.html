<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ordem de Serviço - 4ª Cia</title>
    <style>
        body { margin:0; padding:0; font-family:Arial, sans-serif; background:#000; color:#fff; min-height:100vh; display:flex; flex-direction:column; }
        header { background:#1a1a1a; padding:20px; text-align:center; border-bottom:2px solid #333; position:relative; }
        h1 { margin:0; font-size:2.2rem; }
        .back-btn { position:absolute; left:20px; top:20px; display:inline-block; padding:10px 20px; background:#333; color:white; border-radius:8px; text-decoration:none; font-weight:bold; font-size:1rem; }
        .back-btn:hover { background:#555; }
        .container { padding:20px; text-align:center; flex:1; }
        .buttons-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; max-width:1000px; margin:0 auto 30px auto; }
        .btn { background:#1a1a1a; color:white; padding:25px 15px; font-size:1.3rem; font-weight:bold; text-decoration:none; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.6); border:2px solid #003366; display:block; cursor:pointer; }
        .btn:hover { transform:translateY(-5px); }
        #pdf-viewer { width:100%; height:70vh; border:2px solid #444; border-radius:8px; background:#111; display:none; margin:0 auto; }
        #pdf-viewer.active { display:block; }
        footer { text-align:center; padding:15px; background:#1a1a1a; font-size:0.8rem; color:#888; margin-top:auto; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Voltar à 4ª Cia</a>
        <h1>Ordem de Serviço - 4ª Cia</h1>
    </header>

    <div class="container">

        <!-- EXEMPLO - SUBSTITUA pelo link de "preview" do Google Drive de cada Ordem de Serviço real -->
        <div class="buttons-grid">
            <button class="btn" onclick="showPDF('https://drive.google.com/file/d/SUBSTITUA_PELO_ID_1/preview')">Ordem de Serviço 001/2026</button>
            <button class="btn" onclick="showPDF('https://drive.google.com/file/d/SUBSTITUA_PELO_ID_2/preview')">Ordem de Serviço 002/2026</button>
            <button class="btn" onclick="showPDF('https://drive.google.com/file/d/SUBSTITUA_PELO_ID_3/preview')">Ordem de Serviço 003/2026</button>
        </div>

        <iframe id="pdf-viewer" allowfullscreen></iframe>

    </div>

    <footer>Sistema 4Cia • 2026</footer>

    <script>
        function showPDF(url) {
            const viewer = document.getElementById('pdf-viewer');
            viewer.src = url;
            viewer.classList.add('active');
            viewer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
